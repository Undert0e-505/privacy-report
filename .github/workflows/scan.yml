name: Daily Privacy Scan

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      account:
        description: 'Account ID to scan (optional, scans all enabled if empty)'
        required: false
        type: string
      full:
        description: 'Full rescan (ignore state)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.account }}" ]; then
            ARGS="--account ${{ inputs.account }}"
          fi
          if [ "${{ inputs.full }}" = "true" ]; then
            ARGS="$ARGS --full"
          fi
          npm run scan -- $ARGS

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new reports to commit."
          else
            git commit -m "chore: daily privacy scan report $(date -u +%Y-%m-%d)"
            git push
          fi