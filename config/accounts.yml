# Copy this file to config/accounts.local.yml (gitignored) and fill in real values.
accounts:
  - id: M
    githubUser: "REPLACE_WITH_GITHUB_USERNAME"
    enabled: false
    contactEmail: "REPLACE_WITH_CONTACT_EMAIL"
    ccEmail: "REPLACE_WITH_CC_EMAIL"
    keywords: []
  - id: W
    githubUser: "REPLACE_WITH_W_HANDLE"
    enabled: false
    contactEmail: "REPLACE_WITH_W_EMAIL"
    ccEmail: "REPLACE_WITH_W_CC"
    keywords: []
  - id: R
    githubUser: "REPLACE_WITH_R_HANDLE"
    enabled: false
    contactEmail: "REPLACE_WITH_R_EMAIL"
    ccEmail: "REPLACE_WITH_R_CC"
    keywords: []

scan:
  includeForks: false
  includeArchived: false
  maxFileBytes: 1000000
  redactSecrets: true
  storeExactGps: false