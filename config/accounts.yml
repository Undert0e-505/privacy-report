accounts:
  - id: M
    githubUser: "matokle-sudo"
    enabled: true
    contactEmail: "REPLACE_WITH_M_EMAIL"
    keywords:
      - password
      - secret
      - token
      - api_key
      - private_key
      - .env
      - credentials
      - phone
      - address
  - id: W
    githubUser: "REPLACE_WITH_W_HANDLE"
    enabled: false
    contactEmail: "REPLACE_WITH_W_EMAIL"
